upstreams:
  nan:
    url: "https://api.nan.builders/v1"
    rate_limit_rpm: 1000
    rate_limit_concurrent: 5
    reserved_priority_slots: 2
    reserved_priority_threshold: 1
    first_byte_timeout_s: 60.0
    queue_timeout_s: 1200.0
    stuck_warn_s: 1200.0

profiles:
  default:
    upstream: nan
    queue_priority: 0
    auto_retries: true
    force_stream: true
    model_fallback_enabled: false
    features:
      - model_sampling_defaults
      - drop_oai_only_fields
      - effort_to_thinking_budget
      - thinking_overflow_recovery
      - silent_completion_recovery
      - truncated_content_recovery
      - empty_with_stop_retry

  myproject:
    upstream: nan
    queue_priority: 5
    auto_retries: true
    force_stream: true
    model_fallback_enabled: false
    # This profile is intentionally generic. Rename it locally for a
    # real client, daemon, or project-specific workload.
    features:
      - model_sampling_defaults
      - drop_oai_only_fields
      - effort_to_thinking_budget
      - thinking_overflow_recovery
      - silent_completion_recovery
      - truncated_content_recovery
      - empty_with_stop_retry

default_profile: default
