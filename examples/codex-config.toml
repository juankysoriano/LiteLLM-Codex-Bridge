# Example ~/.codex/config.toml for using OpenAI Codex CLI through resilient-llm-bridge.
#
# Copy to ~/.codex/config.toml (or merge with your existing one) and start
# the bridge (see README). Set X_NAN_KEY (or whichever env var matches your
# provider) in your shell.

model = "qwen3.6"
model_provider = "nan"

# Qwen3-30B-A3B-Thinking-2507 has a 131072-token context. The bridge doesn't
# enforce this — Codex does. 32000 max output is the community-recommended
# sweet spot to avoid mid-answer truncation while keeping latency bounded.
model_context_window = 131072
model_max_output_tokens = 32000

# Codex 0.124+ requires this, not "off".
web_search = "disabled"

[model_providers.nan]
name = "resilient-llm-bridge (codex profile) → NaN Builders"
# Path prefix selects the profile. /codex/v1/... gets the full transform
# stack (input reshape, MCP drop, parallel-tool SSE rewrite, etc).
base_url = "http://127.0.0.1:4242/codex/v1"
env_key = "X_NAN_KEY"
wire_api = "responses"

[tools]
# These OpenAI-hosted tools don't round-trip through a LiteLLM/vLLM upstream.
view_image = false
image_generation = false
